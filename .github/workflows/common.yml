name: common

# Multi-platform Docker build example:
# https://docs.docker.com/build/ci/github-actions/multi-platform/

on:
  workflow_call:
    inputs:
      publish_docker:
        description: 'Publish Docker images to Docker Hub'
        required: false
        default: false
        type: boolean
      tag_name:
        description: 'Tag to publish'
        required: false
        default: 'latest'
        type: string
      move_latest:
        description: 'Move latest version to the new one'
        required: false
        default: false
        type: boolean
      no_build_cache:
        description: 'Do not use cached docker layers on image build'
        required: false
        default: false
        type: boolean
      platforms:
        description: 'Comma separated list of platforms to be built'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string
      run_tests:
        description: 'Run tests'
        required: false
        default: false
        type: boolean
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  common:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        if: ${{ inputs.publish_docker }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          load: ${{ inputs.run_tests }}
          push: false
          tags: singularitynet/omegaclaw:${{ inputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ inputs.no_build_cache }}

      - name: Autotests - Checkout
        if: inputs.run_tests
        uses: actions/checkout@v4

      - name: Autotests - Set up
        if: inputs.run_tests
        run: |
          chmod +x ./scripts/omegaclaw
          ./scripts/omegaclaw start -p Test -c $IRC_CHANNEL -d singularitynet/omegaclaw:${{ inputs.tag_name }}
          pip install pytest
        env:
          TEST_API_KEY: '172.17.0.1'
          IRC_CHANNEL: '#omegaclaw_ci_${{ github.run_id }}'

      - name: Autotests - Blocking Checks
        if: inputs.run_tests
        working-directory: Autotests
        run: pytest -s -v @run_mandatory
        env:
          OMEGACLAW_CONTAINER: omegaclaw
          OMEGACLAW_IRC_CHANNEL: '#omegaclaw_ci_${{ github.run_id }}'

      - name: Autotests - Non-Blocking Checks
        if: inputs.run_tests
        continue-on-error: true
        working-directory: Autotests
        run: pytest -s -v @run_optional
        env:
          OMEGACLAW_CONTAINER: omegaclaw
          OMEGACLAW_IRC_CHANNEL: '#omegaclaw_ci_${{ github.run_id }}'

      - name: Build and push (release)
        if: success() && inputs.publish_docker
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.publish_docker }}
          tags: |
            singularitynet/omegaclaw:${{ inputs.tag_name }}
            ${{ inputs.move_latest && 'singularitynet/omegaclaw:latest' || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ inputs.no_build_cache }}
