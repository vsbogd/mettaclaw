name: common

# Multi-platform Docker build example:
# https://docs.docker.com/build/ci/github-actions/multi-platform/

on:
  workflow_call:
    inputs:
      publish_docker:
        description: 'Publish Docker images to Docker Hub'
        required: false
        default: false
        type: boolean
      tag_name:
        description: 'Tag to publish'
        required: false
        default: 'latest'
        type: string
      move_latest:
        description: 'Move latest version to the new one'
        required: false
        default: false
        type: boolean
      platforms:
        description: 'Comma separated list of platforms to be built'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  common:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        if: ${{ inputs.publish_docker }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push and move latest
        if: ${{ inputs.move_latest }}
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.publish_docker }}
          tags: |
            singularitynet/omegaclaw:${{ inputs.tag_name }}
            singularitynet/omegaclaw:latest

      - name: Build and push
        if: ${{ !inputs.move_latest }}
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.publish_docker }}
          tags: |
            singularitynet/omegaclaw:${{ inputs.tag_name }}
