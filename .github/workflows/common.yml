name: common

# Multi-platform Docker build example:
# https://docs.docker.com/build/ci/github-actions/multi-platform/

on:
  workflow_call:
    inputs:
      publish_docker:
        description: 'Publish Docker images to Docker Hub'
        required: false
        default: false
        type: boolean
      tag_name:
        description: 'Tag to publish'
        required: false
        default: 'latest'
        type: string
      move_latest:
        description: 'Move latest version to the new one'
        required: false
        default: false
        type: boolean
      no_build_cache:
        description: 'Do not use cached docker layers on image build'
        required: false
        default: false
        type: boolean
      platforms:
        description: 'Comma separated list of platforms to be built'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string
      run_tests:
        description: 'Run tests'
        required: false
        default: true
        type: boolean
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  common:
    runs-on: ubuntu-latest
    env:
      AUTOTESTS_OMEGACLAW_CONTAINER: omegaclaw
      AUTOTESTS_OMEGACLAW_TAG: 'cicd-${{ github.run_id }}'
    steps:
      - name: Login to Docker Hub
        if: ${{ inputs.publish_docker }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          load: ${{ inputs.run_tests }}
          push: false
          tags: singularitynet/omegaclaw:${{ env.AUTOTESTS_OMEGACLAW_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          no-cache: ${{ inputs.no_build_cache }}

      - name: Autotests - Checkout
        if: inputs.run_tests
        uses: actions/checkout@v4

      - name: Autotests - Set up
        if: inputs.run_tests
        run: |
          chmod +x ./scripts/omegaclaw
          ./scripts/omegaclaw start -p Test -t test -d singularitynet/omegaclaw:${{ env.AUTOTESTS_OMEGACLAW_TAG }}
          pip install pytest
          echo "Waiting for agent to become ready..."
          ready=
          for i in $(seq 1 90); do
            if docker logs omegaclaw 2>&1 | grep -qE "CHARS_SENT: [0-9]+"; then
              echo "Agent ready after ${i}s"
              ready=1
              break
            fi
            sleep 1
          done
          if [ -z "$ready" ]; then
            echo "::error::Agent did not become ready in 90s"
            docker logs omegaclaw 2>&1 | tail -100
            exit 1
          fi
        env:
          TEST_SERVER_IP: 'host.docker.internal'
          IMPORT_KB_ON_START: '0'

      - name: Autotests - Phase 1 (Blocking Checks)
        if: inputs.run_tests
        working-directory: Autotests
        run: |
          python ../src/helper.py
          pytest -s -v @run_mandatory
        env:
          OMEGACLAW_CONTAINER: ${{ env.AUTOTESTS_OMEGACLAW_CONTAINER }}

      - name: Autotests - Phase 2 (Non-Blocking Checks)
        if: inputs.run_tests
        continue-on-error: true
        working-directory: Autotests
        run: pytest -s -v @run_optional
        env:
          OMEGACLAW_CONTAINER: ${{ env.AUTOTESTS_OMEGACLAW_CONTAINER }}
          OMEGACLAW_GIT_TOKEN: ${{ secrets.CICD_GITHUB_PAT }}

      - name: Build and push (release)
        id: push
        if: success() && inputs.publish_docker
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.publish_docker }}
          tags: |
            singularitynet/omegaclaw:${{ inputs.tag_name }}
            ${{ inputs.move_latest && 'singularitynet/omegaclaw:latest' || '' }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=min
          no-cache: ${{ inputs.no_build_cache }}

      # Docker Hub occasionally returns a transient 400 on the large layer's blob PUT; retry the push once.
      - name: Build and push (release, retry)
        if: inputs.publish_docker && steps.push.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.publish_docker }}
          tags: |
            singularitynet/omegaclaw:${{ inputs.tag_name }}
            ${{ inputs.move_latest && 'singularitynet/omegaclaw:latest' || '' }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=min
          no-cache: ${{ inputs.no_build_cache }}
