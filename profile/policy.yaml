version: 1
filesystem_policy:
  include_workdir: false
  read_only:
  - /bin
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /etc
  - /opt
  - /var/log
  - /sys/devices/system
  - /dev/shm
  - /PeTTa
  read_write:
  - /PeTTa/repos/OmegaClaw-Core/memory
  - /tmp
  - /dev/null
  - /opt/huggingface
  - /opt/sentence_transformers
landlock:
  compatibility: best_effort
agent_path_policy:
  read_protected:
  - memory/audit.metta
  - memory/prompt.txt
  - .git
  - /proc
  - /etc
  - /dev
  - ~/.ssh
  write_protected:
  - src
  - channels
  - scripts
  - profile
  - run.metta
  - lib_omegaclaw.metta
  - Dockerfile
  - .git
  - memory/audit.metta
  - memory/prompt.txt
  - memory/history.metta
  - memory/chroma_db
  - /proc
  - /etc
  - /dev
  - ~/.ssh
