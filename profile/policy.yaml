version: 1
filesystem_policy:
  include_workdir: false
  read_only:
  - /bin
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /etc
  - /opt
  - /var/log
  - /sys/devices/system
  - /dev/shm
  - /PeTTa
  read_write:
  - /PeTTa/repos/OmegaClaw-Core/memory
  - /tmp
  - /dev/null
  - /opt/huggingface
  - /opt/sentence_transformers
landlock:
  compatibility: best_effort
